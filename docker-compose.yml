services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./:/app
      - ~/.gitconfig:/root/.gitconfig
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
    command: npm run dev -- --hostname 0.0.0.0
    stdin_open: true
    tty: true
