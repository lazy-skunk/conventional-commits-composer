name: Lint

on:
  push:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-env

      - name: Run Prettier check
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint
